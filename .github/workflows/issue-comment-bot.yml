name: Issue Comment Bot

on:
  issues:
    types: [opened, labeled]

jobs:
  comment-on-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Add comment based on label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Get the issue details
            const issueData = await github.rest.issues.get({
              owner: owner,
              repo: repo,
              issue_number: issue.number
            });
            
            const labels = issueData.data.labels.map(l => l.name);
            const repoOwner = owner.login;
            
            let comment = "";
            
            // Check labels and add appropriate comment
            if (labels.includes("bug")) {
              comment = "Thank you. We will fix it. Best regards, " + repoOwner + ".";
            } else if (labels.includes("feature")) {
              comment = "Thank you, we will consider to include this feature. Best regards, " + repoOwner + ".";
            } else if (labels.includes("discussion")) {
              comment = "Happy to discuss this topic with you. Best regards, " + repoOwner + ".";
            } else {
              // Default comment for issues with no matching label
              comment = "Hello, world!";
            }
            
            // Add the comment
            await github.rest.issues.createComment({
              owner: owner,
              repo: repo,
              issue_number: issue.number,
              body: comment
            });
            
            console.log("Comment added: " + comment);